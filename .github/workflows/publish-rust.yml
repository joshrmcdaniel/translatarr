name: Publish Rust client

# Builds and tests the translatarr-client crate, attaches a packaged `.crate` to
# the GitHub Release for each v* tag (the same tags that release the app), and
# publishes the crate to crates.io. The crate version is taken from the tag, so a
# v1.2.3 tag publishes translatarr-client 1.2.3. crates.io publishing uses
# Trusted Publishing (OIDC) via rust-lang/crates-io-auth-action, so there is no
# registry-token secret — matching the Docker and Python/TypeScript workflows'
# no-secrets ethos. NOTE: crates.io has no pending-publisher flow, so the *first*
# release of a crate must be published manually (cargo login + cargo publish) to
# create it; the trusted publisher (this workflow file + the `crates-io`
# environment below) can only be configured afterwards. The git-dependency-on-tag
# install path still works too (see clients/rust/README.md).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g. 1.2.3). Required for manual runs."
        required: false

jobs:
  build-and-package:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create/update the Release and upload the asset
    defaults:
      run:
        working-directory: clients/rust

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Resolve version
        id: version
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          elif [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            echo "::error::Provide a 'version' input for manual runs."
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building translatarr-client ${VERSION}"

      - name: Stamp version into the crate
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Only Cargo.toml needs stamping — `VERSION` reads CARGO_PKG_VERSION.
          sed -i -E "0,/^version = \".*\"/s//version = \"${VERSION}\"/" Cargo.toml

      - name: Test
        run: cargo test --all-targets

      - name: Package crate
        run: cargo package --allow-dirty

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: translatarr-client-${{ steps.version.outputs.version }}
          path: clients/rust/target/package/*.crate

      - name: Attach to the GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: clients/rust/target/package/*.crate
          fail_on_unmatched_files: true

  # Publish to crates.io via Trusted Publishing (OIDC) — the auth action mints a
  # short-lived token from the GitHub OIDC claim and revokes it when the job ends,
  # so no CARGO_REGISTRY_TOKEN secret is stored. Tags only, and gated on the build
  # job passing; `cargo publish` rebuilds from the (re-stamped) source, so this
  # job re-checks-out and re-stamps rather than reusing the packaged .crate.
  publish-crates:
    needs: build-and-package
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    environment:
      name: crates-io
      url: https://crates.io/crates/translatarr-client
    permissions:
      id-token: write # mint the OIDC token crates.io exchanges for an upload token
    defaults:
      run:
        working-directory: clients/rust

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Stamp version into the crate
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i -E "0,/^version = \".*\"/s//version = \"${VERSION}\"/" Cargo.toml

      - name: Mint a crates.io token via Trusted Publishing
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish to crates.io
        run: cargo publish --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
